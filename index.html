<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>A31 Board</title>
<style>
:root{
  --bg:#F5F6F8; --col:#ECEEF2; --card:#FFFFFF; --ink:#1C1C1E; --ink2:#6B7280; --ink3:#9CA3AF;
  --line:#E5E7EB; --green:#34C759; --blue:#3B82F6; --orange:#FF9500; --purple:#AF52DE;
  --pink:#EC4899; --teal:#30B0C7; --red:#E5484D; --pin:#FFF9C4;
  --r:12px; --sh:0 1px 3px rgba(16,24,40,.07),0 1px 2px rgba(16,24,40,.04);
  --sh2:0 8px 30px rgba(16,24,40,.12); --tr:.22s ease-in-out;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Inter,sans-serif;
  background:var(--bg); color:var(--ink); font-size:14px; letter-spacing:.1px;
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
button{font:inherit;border:0;background:none;cursor:pointer;color:inherit}
input,select,textarea{font:inherit;color:inherit}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-thumb{background:#D3D7DE;border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

/* ===== App shell ===== */
#app{display:flex;height:100dvh;width:100%}

/* Icon rail */
#rail{width:48px;flex:0 0 48px;background:#FBFBFD;border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;z-index:30}
#rail .rail-logo{width:34px;height:34px;border-radius:9px;margin-bottom:10px;display:block;
  box-shadow:0 1px 4px rgba(0,0,0,.18)}
#rail .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#AF52DE);
  color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-bottom:8px}
.rail-btn{position:relative;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:16px;color:var(--ink2);transition:background var(--tr)}
.rail-btn:hover{background:#EEF0F4}
.rail-btn.active{background:rgba(59,130,246,.12);color:var(--blue);backdrop-filter:blur(6px)}
.rail-btn .badge{position:absolute;top:1px;right:0;background:var(--red);color:#fff;font-size:9px;
  min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;
  padding:0 3px;font-weight:600}
.rail-btn .tip{position:absolute;left:44px;top:50%;transform:translateY(-50%);background:#1C1C1E;color:#fff;
  font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity var(--tr);z-index:60}
.rail-btn:hover .tip{opacity:1}
#rail .spacer{flex:1}

/* Sidebar */
#sidebar{width:256px;flex:0 0 256px;background:#FBFBFD;border-right:1px solid var(--line);
  overflow-y:auto;padding:14px 10px 20px;z-index:29}
.sb-heading{font-size:10.5px;font-weight:700;letter-spacing:.9px;color:var(--ink3);
  text-transform:uppercase;padding:12px 10px 6px}
.sb-item{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;border-radius:9px;
  color:var(--ink);transition:background var(--tr);text-align:left;font-size:13.5px}
.sb-item:hover{background:#EEF0F4}
.sb-item.active{background:rgba(59,130,246,.1);color:var(--blue);font-weight:600}
.sb-item .ic{width:18px;text-align:center;font-size:14px;flex:0 0 18px}
.sb-item .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .cnt{font-size:11.5px;color:var(--ink3);font-variant-numeric:tabular-nums}
.sb-item.active .cnt{color:var(--blue)}
.sb-item .dot{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.sb-parent{font-weight:600}
.sb-child{padding-left:26px}
#sb-close{display:none}

/* ===== Main area ===== */
#main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
#topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--bg);
  border-bottom:1px solid var(--line);flex-wrap:wrap;min-height:54px}
#hamburger{display:none;font-size:18px;padding:6px}
#view-title{font-size:16px;font-weight:700;white-space:nowrap}
#sync{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink3);
  padding:3px 9px;border-radius:20px;background:#EEF0F4;transition:all var(--tr);white-space:nowrap}
#sync.saving{color:var(--orange);background:rgba(255,149,0,.1)}
#sync.saved{color:var(--green);background:rgba(52,199,89,.12)}
#sync .sd{width:6px;height:6px;border-radius:50%;background:currentColor}
#sync.saving .sd{animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.3}}
#searchwrap{flex:1;max-width:360px;min-width:140px;position:relative}
#search{width:100%;padding:7px 12px 7px 32px;border:1px solid var(--line);border-radius:10px;
  background:#fff;outline:none;font-size:13px;transition:box-shadow var(--tr)}
#search:focus{box-shadow:0 0 0 3px rgba(59,130,246,.15);border-color:var(--blue)}
#searchwrap .search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--ink3);pointer-events:none}
#add-task-btn svg,#hamburger svg{vertical-align:-3px}
.seg{display:flex;background:#E4E6EB;border-radius:9px;padding:2px;gap:2px}
.seg button{padding:5px 12px;border-radius:7px;font-size:12.5px;color:var(--ink2);
  transition:all var(--tr);font-weight:500;white-space:nowrap}
.seg button.active{background:#fff;color:var(--ink);font-weight:600;box-shadow:var(--sh)}
#add-task-btn{background:var(--blue);color:#fff;font-weight:600;padding:7px 14px;border-radius:10px;
  box-shadow:var(--sh);transition:transform var(--tr),filter var(--tr);white-space:nowrap}
#add-task-btn:hover{filter:brightness(1.06)}
#add-task-btn:active{transform:scale(.97)}

#content{flex:1;overflow:hidden;position:relative}

/* ===== Kanban ===== */
.board{display:flex;gap:14px;height:100%;overflow-x:auto;overflow-y:hidden;padding:16px;
  scroll-snap-type:x proximity}
.kcol{width:300px;flex:0 0 300px;background:var(--col);border-radius:var(--r);display:flex;
  flex-direction:column;max-height:100%;scroll-snap-align:start;overflow:hidden;
  border-top:4px solid var(--acc,#9CA3AF)}
.kcol.dragover{outline:2px dashed var(--blue);outline-offset:-2px}
.kcol-head{display:flex;align-items:center;gap:7px;padding:10px 12px 6px;font-weight:600;font-size:14px}
.kcol-head .cbadge{background:#fff;color:var(--ink2);font-size:11px;font-weight:600;
  padding:1px 8px;border-radius:10px;font-variant-numeric:tabular-nums}
.kcol-head .flex1{flex:1}
.kcol-head .kcol-sub{font-size:11px;font-weight:500;color:var(--ink3)}
.kcol-head .dots{color:var(--ink3);font-size:15px;padding:2px 4px;border-radius:6px}
.kcol-head .dots:hover{background:#fff}
.kfilter{display:flex;gap:6px;padding:0 12px 8px;align-items:center;flex-wrap:wrap}
.kfilter select{border:0;background:#fff;border-radius:7px;font-size:11px;color:var(--ink2);
  padding:3px 6px;outline:none;max-width:110px}
.kbody{flex:1;overflow-y:auto;padding:2px 10px 8px;display:flex;flex-direction:column;gap:6px}
.subsec-head{display:flex;align-items:center;gap:6px;padding:6px 4px 2px;font-size:11.5px;
  font-weight:700;color:var(--ink2);cursor:pointer;user-select:none}
.subsec-head .chev{transition:transform var(--tr);font-size:9px}
.subsec-head.closed .chev{transform:rotate(-90deg)}
.subsec-head .scount{font-weight:600;color:var(--ink3)}
.subsec-body{display:flex;flex-direction:column;gap:6px;overflow:hidden;transition:opacity var(--tr)}
.subsec-body.closed{display:none}

/* Card */
.card{background:var(--card);border-radius:11px;box-shadow:var(--sh);padding:9px 10px;
  display:flex;gap:9px;cursor:pointer;transition:box-shadow var(--tr),transform var(--tr);
  position:relative}
.card:hover{box-shadow:var(--sh2)}
.card:active{transform:scale(.99)}
.card.pinned{background:var(--pin)}
.card.dragging{opacity:.45}
.card.done-card .ttl{text-decoration:line-through;color:var(--ink3)}
.chk{width:18px;height:18px;flex:0 0 18px;border:1.6px solid #C7CBD3;border-radius:50%;margin-top:1px;
  display:flex;align-items:center;justify-content:center;transition:all var(--tr);font-size:11px;color:#fff}
.chk.p-high{border-color:var(--red)}.chk.p-medium{border-color:var(--orange)}.chk.p-low{border-color:var(--blue)}
.chk.on{background:var(--green);border-color:var(--green)}
.card .body{flex:1;min-width:0}
.card .ttl{font-size:13.5px;font-weight:500;line-height:1.35;word-wrap:break-word}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;padding:1.5px 7px;
  border-radius:6px;background:#F1F2F5;color:var(--ink2);font-weight:500;line-height:1.5}
.chip.cfold{background:color-mix(in srgb,var(--fc,#9CA3AF) 13%,white);color:var(--fc,#6B7280)}
.chip.cdate.ok{background:rgba(52,199,89,.13);color:#1E9E4A}
.chip.cdate.today{background:rgba(59,130,246,.13);color:var(--blue)}
.chip.cdate.over{background:rgba(229,72,77,.12);color:var(--red)}
.chip.cprog{background:#EDEFF3;color:var(--ink2)}
.chip.cpri.high{background:rgba(229,72,77,.12);color:var(--red)}
.chip.cpri.medium{background:rgba(255,149,0,.14);color:#C67600}
.chip.cpri.low{background:rgba(59,130,246,.12);color:var(--blue)}
.card .pinbtn{position:absolute;top:6px;right:7px;font-size:11px;opacity:0;transition:opacity var(--tr);
  padding:2px}
.card:hover .pinbtn{opacity:.55}
.card.pinned .pinbtn{opacity:.9}

/* Quick add */
.qa-wrap{padding:6px 10px 10px}
.qa-btn{width:100%;text-align:left;color:var(--ink3);font-size:12.5px;padding:7px 10px;border-radius:9px;
  transition:background var(--tr)}
.qa-btn:hover{background:rgba(255,255,255,.7);color:var(--ink2)}
.qa-box{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:8px}
.qa-box input{width:100%;border:0;outline:none;font-size:13px}
.qa-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.qa-chips:empty{display:none}
.qa-hint{font-size:10px;color:var(--ink3)}
.qa-actions{display:flex;align-items:center;gap:6px;margin-top:8px}
.qa-actions .btn-primary{padding:5px 12px;font-size:12.5px;border-radius:8px}
.qa-actions .btn-ghost{padding:5px 10px;font-size:12.5px}

/* Popover add-task */
.pop-backdrop{position:fixed;inset:0;z-index:79;background:transparent}
.popover{position:fixed;top:58px;right:16px;width:340px;max-width:calc(100vw - 32px);background:#fff;border-radius:14px;
  box-shadow:var(--sh2);padding:14px;z-index:80;animation:pop .2s ease-in-out}
@keyframes pop{from{opacity:0;transform:translateY(-6px) scale(.98)}to{opacity:1;transform:none}}
.popover .row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.popover input[type=text]{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 10px;
  outline:none;font-size:13px}
.popover input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.14)}
.popover select{border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12.5px;
  background:#fff;outline:none}
.popover .plabel{font-size:11.5px;color:var(--ink2);font-weight:600}
.btn-primary{background:var(--blue);color:#fff;font-weight:600;padding:7px 14px;border-radius:9px;
  transition:filter var(--tr)}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{color:var(--ink2);font-size:12.5px;padding:7px 10px;border-radius:8px}
.btn-ghost:hover{background:#F1F2F5}

/* Modal */
#overlay{position:fixed;inset:0;background:rgba(20,24,32,.35);z-index:90;display:flex;
  align-items:center;justify-content:center;animation:fade .2s ease-in-out;padding:20px}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:16px;box-shadow:var(--sh2);width:520px;max-width:100%;
  max-height:88dvh;overflow-y:auto;padding:20px;animation:pop .22s ease-in-out}
.modal h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center}
.modal h3 .x{margin-left:auto;font-size:16px;color:var(--ink3);padding:4px 8px;border-radius:8px}
.modal h3 .x:hover{background:#F1F2F5}
.m-field{margin-bottom:12px}
.m-field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px}
.m-field input[type=text],.m-field input[type=date],.m-field input[type=time],
.m-field select,.m-field textarea{width:100%;border:1px solid var(--line);border-radius:9px;
  padding:8px 10px;outline:none;font-size:13px;background:#fff}
.m-field textarea{resize:vertical;min-height:64px}
.m-field input:focus,.m-field select:focus,.m-field textarea:focus{border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(59,130,246,.13)}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pri-seg{display:flex;gap:6px}
.pri-seg button{flex:1;border:1px solid var(--line);border-radius:9px;padding:6px 4px;font-size:12px;
  color:var(--ink2);transition:all var(--tr)}
.pri-seg button.on.high{background:rgba(229,72,77,.12);border-color:var(--red);color:var(--red);font-weight:600}
.pri-seg button.on.medium{background:rgba(255,149,0,.14);border-color:var(--orange);color:#C67600;font-weight:600}
.pri-seg button.on.low{background:rgba(59,130,246,.12);border-color:var(--blue);color:var(--blue);font-weight:600}
.pri-seg button.on.none{background:#F1F2F5;border-color:var(--ink3);color:var(--ink);font-weight:600}
.sub-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.sub-row input[type=text]{flex:1;border:0;border-bottom:1px solid var(--line);border-radius:0;padding:4px 2px}
.sub-row .del{color:var(--ink3);font-size:13px}
.sub-add{font-size:12.5px;color:var(--blue);font-weight:600;padding:4px 0}
.modal .foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
.btn-danger{color:var(--red);font-size:12.5px;padding:7px 10px;border-radius:8px}
.btn-danger:hover{background:rgba(229,72,77,.08)}

/* ===== Dashboard ===== */
.dash{padding:18px;overflow-y:auto;height:100%}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;max-width:1100px}
.widget{background:#fff;border-radius:14px;box-shadow:var(--sh);padding:16px}
.widget .wt{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.6px}
.widget .big{font-size:30px;font-weight:800;margin-top:6px;font-variant-numeric:tabular-nums}
.widget .sub{font-size:12px;color:var(--ink3);margin-top:2px}
.donut{width:110px;height:110px;border-radius:50%;margin:10px auto;display:flex;align-items:center;
  justify-content:center;position:relative}
.donut .hole{width:78px;height:78px;background:#fff;border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;font-weight:800;font-size:18px}
.donut .hole span{font-size:10px;color:var(--ink3);font-weight:600}
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;margin-top:12px}
.bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.bars .bar{width:100%;max-width:26px;background:var(--blue);border-radius:6px 6px 3px 3px;min-height:3px;
  transition:height .3s ease-in-out}
.bars .bl{font-size:10px;color:var(--ink3)}
.dash-list .drow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #F1F2F5;font-size:13px}
.dash-list .drow:last-child{border-bottom:0}

/* ===== Calendar ===== */
.calwrap{padding:16px;height:100%;display:flex;flex-direction:column;overflow:hidden}
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cal-head b{font-size:16px}
.cal-nav{width:30px;height:30px;border-radius:9px;background:#fff;box-shadow:var(--sh);font-size:13px}
.cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(84px,1fr);
  gap:6px;overflow-y:auto}
.cal-dow{font-size:11px;font-weight:700;color:var(--ink3);text-align:center;padding:4px 0;text-transform:uppercase}
.cal-cell{background:#fff;border-radius:10px;box-shadow:var(--sh);padding:6px;font-size:11px;
  overflow:hidden;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:box-shadow var(--tr)}
.cal-cell:hover{box-shadow:var(--sh2)}
.cal-cell.dim{opacity:.4}
.cal-cell .dnum{font-weight:700;font-size:11.5px;width:20px;height:20px;display:flex;align-items:center;
  justify-content:center;border-radius:50%}
.cal-cell.today .dnum{background:var(--blue);color:#fff}
.cal-task{font-size:9.5px;padding:1.5px 5px;border-radius:5px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;background:#F1F2F5;border-left:3px solid var(--tc,#9CA3AF)}
.cal-more{font-size:9.5px;color:var(--ink3)}

/* Kanban + Calendar split */
.split{display:flex;height:100%;overflow:hidden}
.split .board{flex:1.35;min-width:0}
.split .calside{flex:1;border-left:1px solid var(--line);min-width:320px;overflow:hidden;display:flex}
.split .calwrap{flex:1}

/* ===== Timeline ===== */
.tlwrap{padding:16px;height:100%;overflow:auto}
.tl-scale{display:grid;grid-template-columns:150px repeat(14,minmax(52px,1fr));position:sticky;top:0;
  background:var(--bg);z-index:2;padding-bottom:4px}
.tl-scale .tld{font-size:10px;color:var(--ink3);text-align:center;font-weight:600}
.tl-scale .tld.today{color:var(--blue)}
.tl-row{display:grid;grid-template-columns:150px repeat(14,minmax(52px,1fr));align-items:center;
  border-top:1px solid var(--line);min-height:46px;position:relative}
.tl-fold{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px;padding-right:8px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.tl-cell{height:100%;border-left:1px dashed #E8EAEF}
.tl-cell.today{background:rgba(59,130,246,.05)}
.tl-bar{position:absolute;height:24px;top:50%;transform:translateY(-50%);border-radius:7px;
  color:#fff;font-size:10px;display:flex;align-items:center;padding:0 7px;overflow:hidden;
  white-space:nowrap;cursor:grab;box-shadow:var(--sh)}
.tl-bar:active{cursor:grabbing}

/* ===== Eisenhower ===== */
.eiwrap{height:100%;padding:16px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:12px;overflow:auto}
.quad{border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;
  border:1.5px solid transparent;transition:border var(--tr)}
.quad.dragover{border-color:var(--blue)}
.quad h4{font-size:12.5px;display:flex;gap:6px;align-items:center}
.quad .qc{font-size:11px;color:var(--ink2);background:rgba(255,255,255,.75);border-radius:9px;padding:0 7px}
.quad.q1{background:rgba(229,72,77,.07)}.quad.q2{background:rgba(59,130,246,.07)}
.quad.q3{background:rgba(255,149,0,.08)}.quad.q4{background:rgba(107,114,128,.08)}

/* ===== Mobile ===== */
#tabbar{display:none}
#drawer-bg{display:none}
@media (max-width:767px){
  #rail{display:none}
  #sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-105%);transition:transform .26s ease-in-out;
    box-shadow:var(--sh2);width:280px;z-index:100;padding-bottom:80px}
  #sidebar.open{transform:none}
  #sb-close{display:block;margin-left:auto;font-size:16px;padding:4px 10px;color:var(--ink3)}
  #drawer-bg.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
  #hamburger{display:block}
  #topbar{gap:8px;padding:8px 10px}
  #view-title{font-size:14.5px}
  #searchwrap{order:5;flex:1 1 100%;max-width:none}
  .board{scroll-snap-type:x mandatory;padding:12px;gap:10px}
  .kcol{width:calc(100vw - 44px);flex:0 0 calc(100vw - 44px);scroll-snap-align:center}
  #content{padding-bottom:56px}
  .split .calside{display:none}
  .eiwrap{grid-template-columns:1fr;grid-template-rows:none;grid-auto-rows:minmax(180px,auto)}
  .modal{width:100%;max-height:94dvh;border-radius:16px 16px 0 0;align-self:flex-end}
  #overlay{padding:0;align-items:flex-end}
  .pop-backdrop{background:rgba(0,0,0,.3)}
  .popover{left:10px;right:10px;width:auto;max-width:none;top:auto;bottom:66px}
  #tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;height:56px;background:rgba(251,251,253,.92);
    backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:50;align-items:center;
    padding-bottom:env(safe-area-inset-bottom)}
  #tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;font-size:10px;color:var(--ink2);height:100%}
  #tabbar button.active{color:var(--blue);font-weight:600}
  #tabbar button .ti{font-size:18px}
  #tabbar button.tb-fab{flex:0 0 auto;width:54px;height:54px;margin:0 4px;border-radius:50%;
    background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.4);
    transform:translateY(-14px);flex-direction:row}
  #tabbar button.tb-fab:active{transform:translateY(-14px) scale(.94)}
  #tabbar button.tb-fab .ico{width:26px;height:26px;stroke-width:2.2}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
.empty{color:var(--ink3);font-size:12px;text-align:center;padding:16px 8px}

/* ===== Auth gate ===== */
#auth-gate{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  padding:24px;background:radial-gradient(1200px 800px at 20% -10%,#EAF1FF,transparent),
  radial-gradient(1000px 700px at 110% 110%,#F6EDFF,transparent),var(--bg)}
#auth-gate.hidden{display:none}
.ag-card{background:#fff;border-radius:22px;box-shadow:0 20px 60px rgba(16,24,40,.14);
  padding:34px 30px;max-width:380px;width:100%;text-align:center}
.ag-logo{width:72px;height:72px;border-radius:18px;margin:0 auto 16px;display:block;
  box-shadow:0 8px 22px rgba(26,35,60,.28)}
.ag-card h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ag-sub{color:var(--ink2);font-size:13.5px;line-height:1.55;margin:8px 4px 22px}
.ag-google{display:inline-flex;align-items:center;gap:10px;width:100%;justify-content:center;
  padding:12px 16px;border:1px solid var(--line);border-radius:12px;font-weight:600;font-size:14px;
  background:#fff;transition:box-shadow var(--tr),transform var(--tr)}
.ag-google:hover{box-shadow:0 6px 18px rgba(16,24,40,.1)}
.ag-google:active{transform:scale(.98)}
.ag-google:disabled{opacity:.6;cursor:default}
.ag-status{font-size:12px;color:var(--ink3);min-height:16px;margin-top:12px}
.ag-status.err{color:var(--red)}
.ag-foot{font-size:11px;color:var(--ink3);margin-top:18px;line-height:1.5}
#install-btn{display:none;position:fixed;right:14px;bottom:14px;z-index:150;background:var(--ink);
  color:#fff;font-weight:600;font-size:12.5px;padding:9px 14px;border-radius:22px;
  box-shadow:var(--sh2)}
#install-btn.show{display:block}
@media (max-width:767px){#install-btn{bottom:64px}}
/* user chip in rail avatar */
#rail .avatar{cursor:pointer;overflow:hidden}
#rail .avatar img{width:100%;height:100%;object-fit:cover}

/* ===== Sidebar folder tree controls ===== */
.sb-addbtn{width:20px;height:20px;border-radius:6px;color:var(--ink3);font-size:14px;line-height:1;
  display:flex;align-items:center;justify-content:center}
.sb-addbtn:hover{background:#E8EAEF;color:var(--blue)}
.sb-group{margin-bottom:1px}
.sb-item .sb-chev{width:16px;height:16px;flex:0 0 16px;font-size:9px;color:var(--ink3);
  display:flex;align-items:center;justify-content:center;border-radius:4px;transition:transform var(--tr)}
.sb-item .sb-chev.closed{transform:rotate(-90deg)}
.sb-item .sb-chev:hover{background:#E0E3E9}
.sb-item .lbl,.sb-item .ic,.sb-item .dot{cursor:pointer}
.sb-mini{width:20px;height:20px;flex:0 0 20px;border-radius:6px;color:var(--ink3);font-size:12px;
  opacity:0;display:flex;align-items:center;justify-content:center;transition:opacity var(--tr),background var(--tr)}
.sb-item:hover .sb-mini{opacity:.65}
.sb-mini:hover{background:#E0E3E9;opacity:1;color:var(--ink)}
.sb-children{margin-bottom:2px}
.sb-empty-sub{font-size:11px;color:var(--ink3);padding:4px 10px 4px 34px}
.sb-empty-sub a{color:var(--blue);cursor:pointer;font-weight:600}
.sb-addgroup{width:calc(100% - 4px);margin:6px 2px 0;text-align:left;color:var(--ink3);font-size:12.5px;
  padding:7px 10px;border-radius:9px;border:1px dashed var(--line);transition:all var(--tr)}
.sb-addgroup:hover{background:#EEF0F4;color:var(--blue);border-color:var(--blue)}

/* ===== Folder editor grids ===== */
.icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.icon-opt{aspect-ratio:1;border:1px solid var(--line);border-radius:9px;font-size:17px;
  display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.icon-opt:hover{background:#F1F2F5}
.icon-opt.on{border-color:var(--blue);background:rgba(59,130,246,.12);box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.color-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.color-opt{aspect-ratio:1;border-radius:50%;border:2px solid transparent;transition:transform var(--tr)}
.color-opt:hover{transform:scale(1.15)}
.color-opt.on{border-color:var(--ink);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ink)}
optgroup{font-size:11px;color:var(--ink3)}
@media (max-width:767px){ .color-grid{grid-template-columns:repeat(8,1fr)} }

/* ===== Line-icon system ===== */
.ico{display:inline-block;vertical-align:middle;flex:0 0 auto}
.chip .ico{vertical-align:-2px;margin-right:1px}
.sb-item .ic{display:inline-flex;align-items:center;justify-content:center;color:var(--ink2)}
.sb-item.active .ic{color:var(--blue)}
.sb-item .ic .ico{width:18px;height:18px}
.rail-btn .ico{width:20px;height:20px}
.kcol-ic{display:inline-flex;align-items:center}
.kcol-head .cbadge{margin-left:2px}
.chk .ico{width:13px;height:13px;stroke-width:2.4}
.pinbtn .ico,.dots .ico,.sb-mini .ico,.sb-addbtn .ico,.cal-nav .ico,.x .ico,.sub-add .ico{vertical-align:middle}
.subsec-head .chev .ico{width:12px;height:12px}
.subsec-head.closed .chev .ico{transform:rotate(-90deg)}
.sb-chev .ico{width:12px;height:12px}
.sb-chev.closed .ico{transform:rotate(-90deg)}
#tabbar .ti .ico{width:22px;height:22px}
.icon-opt .ico{pointer-events:none}
.pri-seg button .ico{vertical-align:-2px}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect,
         getRedirectResult, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, set, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* ============================================================
   >>> TEMPEL FIREBASE CONFIG ANDA DI SINI <<<
   Ambil dari: Firebase Console > Project settings > Your apps > Web app > "SDK setup and configuration" > Config
   Ganti seluruh objek di bawah ini.
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDk1Xw18IiCIanZb0eS0cQ6e3IlO3Ijhdg",
  authDomain: "a31-board.firebaseapp.com",
  databaseURL: "https://a31-board-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "a31-board",
  storageBucket: "a31-board.firebasestorage.app",
  messagingSenderId: "627503915556",
  appId: "1:627503915556:web:afbe687cda0485e217aeb1"
};

const CONFIGURED = !firebaseConfig.apiKey.startsWith("GANTI");
let fbApp, fbAuth, fbDb, fbUser=null, dbRef=null, unsub=null;

// Expose small bridge to the (classic) app script below via window.__FB
window.__FB = {
  configured: CONFIGURED,
  init(){
    if(!CONFIGURED) return false;
    fbApp = initializeApp(firebaseConfig);
    fbAuth = getAuth(fbApp);
    fbDb = getDatabase(fbApp);
    return true;
  },
  login(){
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    return signInWithPopup(fbAuth, provider)
      .then(res=>{
        // Popup resolved with a user — drive the UI directly in case
        // onAuthStateChanged is slow/blocked (COOP, PWA, some mobile browsers).
        if(res && res.user && window.__onAuthUser){ window.__onAuthUser(res.user); }
      })
      .catch(err=>{
        // Popup diblokir/tidak didukung? fallback ke redirect.
        if(err && (err.code==='auth/popup-blocked'||err.code==='auth/cancelled-popup-request'||err.code==='auth/operation-not-supported-in-this-environment'||err.code==='auth/popup-closed-by-user')){
          try{ signInWithRedirect(fbAuth, provider); }catch(e){ window.__onAuthError && window.__onAuthError((err.code||'')+' '+(err.message||'')); }
        } else { window.__onAuthError && window.__onAuthError((err.code? err.code+': ':'')+(err.message||String(err))); }
      });
  },
  logout(){ if(fbAuth) signOut(fbAuth); },
  watchAuth(cb){ if(fbAuth) onAuthStateChanged(fbAuth, cb); },
  // Realtime data for a user
  bind(uid, onData){
    dbRef = ref(fbDb, 'users/'+uid+'/board');
    if(unsub) unsub();
    unsub = onValue(dbRef,
      snap => onData(snap.val()),
      err => { // permission-denied atau rules belum di-publish
        console.warn('DB read error:', err && err.message);
        window.__onDbError && window.__onDbError(err && err.message);
      });
  },
  push(uid, payload){
    return set(ref(fbDb,'users/'+uid+'/board'), payload);
  }
};
// Surface redirect-login errors if any
try { if(CONFIGURED){ window.__FB.init(); getRedirectResult(getAuth(fbApp)).catch(()=>{}); } } catch(e){ console.error('Init Firebase gagal:', e); }
// Penanda bahwa modul Firebase sudah selesai dimuat (untuk polling di app script)
window.__FB_MODULE_LOADED = true;
</script>

/* ---------- Storage: Firebase Realtime DB (sync) + localStorage cache (offline) ---------- */
const KEY='a31-board-v1';
let CURRENT_UID=null;
let applyingRemote=false;   // guard: don't echo remote snapshot back to DB

function cacheKey(){ return KEY + (CURRENT_UID? (':'+CURRENT_UID) : ''); }

function readLocalCache(){
  try{ const raw=localStorage.getItem(cacheKey()); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}
function writeLocalCache(payload){ try{ localStorage.setItem(cacheKey(), JSON.stringify(payload)); }catch(e){} }

function hydrate(d){
  if(!d) return;
  // Server = sumber kebenaran. Ambil apa adanya dari snapshot.
  S.folders = (d.folders && d.folders.length) ? d.folders : S.folders;
  S.tasks   = Array.isArray(d.tasks) ? d.tasks : [];
  S.ui      = Object.assign(S.ui, d.ui||{}, {search:''});
  if(!S.ui.foldOpen) S.ui.foldOpen={};
  migrateFolders();
}
// Backward-compat: if a saved board used the old flat folders (no parentId),
// wrap them under a "New Life 3.0" group so nothing breaks.
function migrateFolders(){
  const hasParent = S.folders.some(f=>'parentId' in f);
  if(!hasParent && S.folders.length){
    const g={id:'g-life',name:'New Life 3.0',icon:'trophy',color:'#7C3AED',parentId:null};
    S.folders = [g, ...S.folders.map(f=>({...f,parentId:g.id}))];
  }
  ensureFallback();
  // Emoji icons from older versions -> line-icon names.
  const EMAP={'🏆':'trophy','📥':'inbox','💰':'money','🎯':'target','🧘':'yoga','🌱':'leaf','❤️':'heart',
    '🏔️':'mountain','📝':'note','💡':'bulb','🛒':'cart','🏋️':'dumbbell','🎨':'palette','📞':'phone',
    '🔧':'wrench','✈️':'plane','🍽️':'utensils','💼':'briefcase','🏠':'home','⭐':'star','🚀':'rocket',
    '📚':'book','🧩':'puzzle','🗂️':'folders','🌍':'globe'};
  for(const f of S.folders){ if(f.icon && EMAP[f.icon]) f.icon=EMAP[f.icon];
    if(!f.icon || !ICON_PATHS[f.icon]) f.icon=(f.parentId===null?'folders':'folder'); }
  // Reassign any task pointing to a group or missing folder → a valid leaf.
  const leafIds=new Set(leafFolders().map(f=>f.id));
  for(const t of S.tasks){ if(!leafIds.has(t.folderId)) t.folderId=firstLeaf(); }
}

// Called once user is known. Loads cache instantly, then subscribes to realtime DB.
let __remoteArrived=false;   // apakah snapshot pertama dari server sudah datang?
let __fbBound=false;         // guard supaya tidak subscribe ke Firebase dua kali

/* Tunggu modul Firebase (dimuat asinkron dari CDN) benar-benar siap.
   Di HP, script app sering jalan sebelum modul selesai — jadi kita polling
   ringan tiap 100ms, maksimal ~10 detik. Kalau timeout → callback(false)
   sebagai fallback ke mode lokal. */
function whenFirebaseReady(callback){
  const INTERVAL=100, MAX=10000; // ms
  let waited=0;
  const timer=setInterval(()=>{
    if(window.__FB && typeof window.__FB.configured !== 'undefined'){
      clearInterval(timer);
      callback(true);
    } else if((waited+=INTERVAL) >= MAX){
      clearInterval(timer);
      callback(false); // timeout → mode lokal
    }
  }, INTERVAL);
}

/* Subscribe ke Firebase. Dipisah dari startSync supaya bisa dipanggil
   setelah modul siap. Guard __fbBound mencegah subscribe ganda. */
function bindFirebase(uid){
  if(__fbBound) return;
  __fbBound=true;
  window.__FB.bind(uid, (remote)=>{
    applyingRemote=true;
    const hasRemoteBoard = remote && (Array.isArray(remote.tasks) || (remote.folders && remote.folders.length));
    if(hasRemoteBoard){
      // Data server ada → pakai itu (menang atas cache lokal).
      hydrate(remote);
      __remoteArrived=true;
      writeLocalCache({folders:S.folders,tasks:S.tasks,ui:{...S.ui,search:''}});
      applyingRemote=false;
      setSync('saved');
      render();
    } else {
      // Server benar-benar KOSONG (belum pernah ada board).
      // Seed hanya sekali, lalu push ke server sebagai isi awal bersama.
      if(!__remoteArrived){
        __remoteArrived=true;
        if(!Array.isArray(S.tasks) || S.tasks.length===0){
          if(!S.ui.seeded){ S.tasks=seedTasks(); S.ui.seeded=true; }
        }
        applyingRemote=false;   // izinkan push berikutnya
        pushRemote();           // tulis isi awal ke server
        writeLocalCache({folders:S.folders,tasks:S.tasks,ui:{...S.ui,search:''}});
        setSync('saved');
        render();
      } else {
        applyingRemote=false;
      }
    }
  });
}

async function startSync(uid){
  CURRENT_UID = uid;
  // 1) instant paint from local cache (offline-first) — HANYA untuk tampilan awal.
  //    Jangan seed di sini; tunggu server supaya tidak menimpa data perangkat lain.
  const cached = readLocalCache();
  if(cached){ hydrate(cached); }
  render();
  if(new URLSearchParams(location.search).get('add')==='1'){ setTimeout(()=>{ try{ openAddTask(new Event('click')); }catch(e){} }, 300); }

  // 2) subscribe to Firebase; remote SELALU sumber kebenaran begitu tiba.
  //    Keputusan online vs lokal DITUNDA sampai modul Firebase siap (penting
  //    untuk HP yang lambat). Selagi menunggu, tampilkan status "Menyimpan…".
  setSync('saving');
  whenFirebaseReady((ready)=>{
    if(ready && window.__FB && window.__FB.configured){
      bindFirebase(uid);
    } else {
      setSync('error'); // no config / timeout -> local-only mode
    }
  });
}

let saveTimer=null;
function pushRemote(){
  // Pengaman: jangan pernah menulis board KOSONG ke server sebelum kita
  // menerima snapshot pertama. Ini mencegah satu perangkat menghapus data
  // perangkat lain saat baru start (last-write-wins yang merusak).
  const emptyBoard = (!Array.isArray(S.tasks) || S.tasks.length===0);
  if(emptyBoard && !__remoteArrived){
    setSync('saved');   // tampilkan aman; tunggu server dulu
    return;
  }
  const payload={folders:S.folders,tasks:S.tasks,ui:{...S.ui,search:''},updatedAt:Date.now()};
  writeLocalCache(payload);
  if(window.__FB && window.__FB.configured && CURRENT_UID){
    window.__FB.push(CURRENT_UID, payload)
      .then(()=>setSync('saved'))
      .catch(()=>setSync('error'));
  } else { setSync('error'); }
}

// Public save() used everywhere in the app. Debounced. Skips echo of remote data.
function save(){
  if(applyingRemote) return;          // don't write back what we just read
  setSync('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(pushRemote, 300);
}

let __lastRemoteOk=false;   // pernah berhasil baca/tulis ke Firebase?
let __notifTimer=null;      // dideklarasikan lebih awal: dipakai render()/bootAuth() sebelum blok notifikasi
function setSync(st){
  const el=document.getElementById('sync'), tx=document.getElementById('sync-txt');
  if(!el||!tx) return;
  // Kalau benar-benar tidak ada jaringan → Offline (apa pun state-nya).
  if(navigator.onLine===false){
    el.className='saved'; tx.textContent='Offline'; return;
  }
  if(st==='saved') __lastRemoteOk=true;
  if(st==='saving'){ el.className='saving'; tx.textContent='Menyimpan…'; return; }
  if(st==='error'){
    // 'error' di sini = tulis/baca DB gagal. Jika ini karena RULES (bukan jaringan),
    // app tetap jalan dari cache; tampilkan "Lokal" bukan "Offline" biar tidak membingungkan.
    el.className='saving';
    tx.textContent = __lastRemoteOk ? 'Menyimpan…' : 'Lokal';
    return;
  }
  el.className='saved'; tx.textContent='Synced';
}
// Perbarui label saat status jaringan berubah
window.addEventListener('online',  ()=>{ setSync(__lastRemoteOk?'saved':'error'); pushRemote(); });
window.addEventListener('offline', ()=>setSync('saved'));

/* ---------- Smart natural-language parser (Bahasa Indonesia) ---------- */
const DAYNAMES = {minggu:0,ahad:0,senin:1,selasa:2,rabu:3,kamis:4,jumat:5,"jum'at":5,sabtu:6};
function parseInput(text){
  let title=' '+text+' ';
  const out={title:'',priority:null,due:null,time:null,tags:[]};
  // priority
  title=title.replace(/\s!(high|tinggi)\b/i,()=>{out.priority='high';return ' ';});
  title=title.replace(/\s!(med(ium)?|sedang)\b/i,()=>{out.priority='medium';return ' ';});
  title=title.replace(/\s!(low|rendah)\b/i,()=>{out.priority='low';return ' ';});
  // tags
  title=title.replace(/\s#([\p{L}\p{N}_-]+)/gui,(m,tag)=>{out.tags.push(tag.toLowerCase());return ' ';});
  // time: jam 14, 14:30, 14.30
  title=title.replace(/\s(?:jam\s+)?([01]?\d|2[0-3])[:.]([0-5]\d)\b/,(m,h,mn)=>{
    out.time=String(h).padStart(2,'0')+':'+mn; return ' ';});
  title=title.replace(/\sjam\s+([01]?\d|2[0-3])\b/i,(m,h)=>{out.time=String(h).padStart(2,'0')+':00';return ' ';});
  // explicit dd/mm(/yyyy)
  title=title.replace(/\s(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/,(m,d,mo,y)=>{
    const now=new Date(); let yr=y?(+y<100?2000+ +y:+y):now.getFullYear();
    const dt=new Date(yr,+mo-1,+d);
    if(!y && dt < new Date(now.getFullYear(),now.getMonth(),now.getDate())) dt.setFullYear(yr+1);
    out.due=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    return ' ';});
  // relative words
  const rel=[[/\shari ini\b/i,0],[/\sbesok\b/i,1],[/\slusa\b/i,2],[/\sminggu depan\b/i,7]];
  for(const [re,n] of rel){ if(re.test(title)){ title=title.replace(re,' '); out.due=addDays(todayISO(),n); break; } }
  // weekday (+ depan)
  if(!out.due){
    const re=new RegExp('\\s('+Object.keys(DAYNAMES).join('|')+")(\\s+depan)?\\b",'i');
    const m=title.match(re);
    if(m){ const target=DAYNAMES[m[1].toLowerCase()]; const now=new Date();
      let diff=(target-now.getDay()+7)%7; if(diff===0) diff=7; if(m[2]) diff+=7;
      out.due=addDays(todayISO(),diff); title=title.replace(re,' '); }
  }
  out.title=title.replace(/\s+/g,' ').trim();
  return out;
}
function chipHTML(p){
  let h='';
  if(p.priority){ const pr=PRI[p.priority]; h+=`<span class="chip cpri ${pr.c}">${ic('flag',12)} ${pr.lbl}</span>`; }
  if(p.due) h+=`<span class="chip cdate ${dateClass(p.due)}">${ic('calendar',12)} ${fmtDate(p.due)}</span>`;
  if(p.time) h+=`<span class="chip">${ic('clock',12)} ${p.time}</span>`;
  for(const t of p.tags) h+=`<span class="chip">#${esc(t)}</span>`;
  return h;
}
function fmtDate(iso){
  const t=todayISO();
  if(iso===t) return 'Hari ini';
  if(iso===addDays(t,1)) return 'Besok';
  const d=new Date(iso+'T00:00:00');
  return d.getDate()+' '+MONTHS[d.getMonth()];
}
function dateClass(iso){ const t=todayISO();
  if(iso<t) return 'over'; if(iso===t) return 'today'; return 'ok'; }

/* ---------- Folder tree helpers (2 levels) ---------- */
const PALETTE = ['#7C3AED','#3B82F6','#34C759','#FF9500','#EC4899','#30B0C7','#AF52DE','#E5484D','#F59E0B','#10B981','#6366F1','#8E8E93'];
const groups = () => S.folders.filter(f=>f.parentId===null);
const childrenOf = gid => S.folders.filter(f=>f.parentId===gid);
const isGroup = fid => { const f=S.folders.find(x=>x.id===fid); return f && f.parentId===null; };
const leafFolders = () => S.folders.filter(f=>f.parentId!==null);
function firstLeaf(){ const l=leafFolders(); return l.length?l[0].id:FALLBACK_FID; }
// Resolve the current selection to a valid LEAF folder id for new tasks.
function defaultLeaf(){
  const sel=S.ui.folder;
  if(sel){ if(isGroup(sel)){ const k=childrenOf(sel); if(k.length) return k[0].id; }
    else if(S.folders.some(f=>f.id===sel)) return sel; }
  return firstLeaf();
}
// Build grouped <optgroup> options for folder selects (leaves only).
function folderOptions(selected){
  return groups().map(g=>{
    const kids=childrenOf(g.id); if(!kids.length) return '';
    return `<optgroup label="${esc(g.name)}">`+
      kids.map(f=>`<option value="${f.id}" ${f.id===selected?'selected':''}>${esc(f.name)}</option>`).join('')+
      `</optgroup>`;
  }).join('');
}
function ensureFallback(){
  // Selalu ada minimal 1 grup & 1 subfolder agar task punya tempat.
  if(groups().length===0) S.folders.push({id:'g-life',name:'New Life 3.0',icon:'trophy',color:'#7C3AED',parentId:null});
  if(leafFolders().length===0){ const g=groups()[0];
    S.folders.push({id:FALLBACK_FID,name:'Uncategorized',icon:'inbox',color:'#8E8E93',parentId:g.id}); }
}
// Task counts: leaf = own tasks; group = sum of children.
function folderCount(fid){
  const f=S.folders.find(x=>x.id===fid); if(!f) return 0;
  if(f.parentId===null){ const kids=childrenOf(fid).map(k=>k.id);
    return S.tasks.filter(t=>kids.includes(t.folderId)&&!t.done).length; }
  return S.tasks.filter(t=>t.folderId===fid && !t.done).length;
}

/* ---------- Folder CRUD ---------- */
function addGroup(){
  const name=prompt('Nama folder induk baru:','Folder Baru'); if(name===null) return;
  const g={id:'g'+uid(),name:name.trim()||'Folder Baru',
    icon:GROUP_ICON_SET[groups().length%GROUP_ICON_SET.length],
    color:PALETTE[S.folders.length%PALETTE.length],parentId:null};
  mutate(()=>{ S.folders.push(g); S.ui.foldOpen[g.id]=true; });
}
function addSub(gid){
  const name=prompt('Nama subfolder baru:','Subfolder'); if(name===null) return;
  const sub={id:'f'+uid(),name:name.trim()||'Subfolder',
    icon:FOLDER_ICON_SET[leafFolders().length%FOLDER_ICON_SET.length],
    color:PALETTE[S.folders.length%PALETTE.length],parentId:gid};
  mutate(()=>{ S.folders.push(sub); S.ui.foldOpen[gid]=true; });
}
function delFolder(fid){
  const f=S.folders.find(x=>x.id===fid); if(!f) return;
  if(f.parentId===null){
    const kids=childrenOf(fid);
    const nTasks=kids.reduce((n,k)=>n+S.tasks.filter(t=>t.folderId===k.id).length,0);
    if(!confirm(`Hapus folder induk "${f.name}"?\n${kids.length} subfolder & ${nTasks} tugas di dalamnya ikut terhapus.`)) return;
    const kidIds=kids.map(k=>k.id);
    mutate(()=>{ S.folders=S.folders.filter(x=>x.id!==fid && !kidIds.includes(x.id));
      S.tasks=S.tasks.filter(t=>!kidIds.includes(t.folderId)); ensureFallback();
      if(S.ui.folder===fid) S.ui.folder=null; });
  } else {
    const n=S.tasks.filter(t=>t.folderId===fid).length;
    if(!confirm(`Hapus subfolder "${f.name}"?\n${n} tugas di dalamnya ikut terhapus.`)) return;
    mutate(()=>{ S.folders=S.folders.filter(x=>x.id!==fid);
      S.tasks=S.tasks.filter(t=>t.folderId!==fid); ensureFallback();
      if(S.ui.folder===fid) S.ui.folder=null; });
  }
}
function toggleGroup(gid){ S.ui.foldOpen[gid]=!(S.ui.foldOpen[gid]!==false); save(); render(); }
// open folder-editor modal (defined later)

/* ---------- Task helpers & filtering ---------- */
const folderOf = id => S.folders.find(f=>f.id===id) || leafFolders()[0] || S.folders[0];
function taskMatches(t){
  const q=S.ui.search.trim().toLowerCase();
  if(q && !(t.title.toLowerCase().includes(q) || t.tags.some(x=>x.includes(q)) ||
            (t.notes||'').toLowerCase().includes(q))) return false;
  if(S.ui.folder){
    if(isGroup(S.ui.folder)){ const kids=childrenOf(S.ui.folder).map(k=>k.id);
      if(!kids.includes(t.folderId)) return false; }
    else if(t.folderId!==S.ui.folder) return false;
  }
  const td=todayISO();
  switch(S.ui.smart){
    case 'today':    return t.due===td;
    case 'tomorrow': return t.due===addDays(td,1);
    case 'next7':    return !!t.due && t.due>=td && t.due<=addDays(td,7);
    case 'inbox':    return t.folderId===FALLBACK_FID || t.folderId===firstLeaf();
    default:         return true;
  }
}
const visibleTasks = () => S.tasks.filter(taskMatches);
function smartCount(k){ const bak=S.ui.smart,bak2=S.ui.folder,bak3=S.ui.search;
  S.ui.smart=k;S.ui.folder=null;S.ui.search='';
  const n=S.tasks.filter(t=>taskMatches(t)&&!t.done).length;
  S.ui.smart=bak;S.ui.folder=bak2;S.ui.search=bak3; return n; }

function mutate(fn){ fn(); save(); render(); }
function toggleDone(id){ mutate(()=>{ const t=S.tasks.find(x=>x.id===id); if(!t)return;
  t.done=!t.done; t.status=t.done?'done':(t.status==='done'?'todo':t.status); }); }
function togglePin(id){ mutate(()=>{ const t=S.tasks.find(x=>x.id===id); if(t) t.pinned=!t.pinned; }); }

/* ---------- Grouping (segmented control) ---------- */
function columnsFor(mode){
  const td=todayISO();
  if(mode==='folder'){
    let leaves=leafFolders();
    // Jika sedang memfilter 1 grup, tampilkan hanya subfolder grup itu.
    if(S.ui.folder && isGroup(S.ui.folder)) leaves=childrenOf(S.ui.folder);
    return leaves.map(f=>{ const g=S.folders.find(x=>x.id===f.parentId);
      return {key:f.id, name:f.name, icon:f.icon, color:f.color,
        sub:(g?g.name:''), test:t=>t.folderId===f.id, assign:t=>t.folderId=f.id}; });
  }
  if(mode==='status') return STATUSES.map(s=>({key:s.id,name:s.name,icon:s.icon,color:s.color,
    test:t=>t.status===s.id, assign:t=>{t.status=s.id;t.done=s.id==='done';}}));
  if(mode==='priority') return [
    {key:'high',name:'Tinggi',icon:'flag',color:'#E5484D',test:t=>t.priority==='high',assign:t=>t.priority='high'},
    {key:'medium',name:'Sedang',icon:'flag',color:'#FF9500',test:t=>t.priority==='medium',assign:t=>t.priority='medium'},
    {key:'low',name:'Rendah',icon:'flag',color:'#3B82F6',test:t=>t.priority==='low',assign:t=>t.priority='low'},
    {key:'none',name:'Tanpa Prioritas',icon:'flag',color:'#9CA3AF',test:t=>!t.priority||t.priority==='none',assign:t=>t.priority='none'}];
  // date
  return [
    {key:'d-today',name:'Hari Ini',icon:'calendar',color:'#3B82F6',test:t=>t.due===td||( !!t.due&&t.due<td&&!t.done),assign:t=>t.due=td},
    {key:'d-tmr',name:'Besok',icon:'sunrise',color:'#34C759',test:t=>t.due===addDays(td,1),assign:t=>t.due=addDays(td,1)},
    {key:'d-week',name:'Minggu Ini',icon:'week',color:'#FF9500',test:t=>!!t.due&&t.due>addDays(td,1)&&t.due<=addDays(td,7),assign:t=>t.due=addDays(td,3)},
    {key:'d-later',name:'Akan Datang',icon:'clock',color:'#AF52DE',test:t=>!!t.due&&t.due>addDays(td,7),assign:t=>t.due=addDays(td,10)},
    {key:'d-none',name:'Tanpa Tanggal',icon:'inbox',color:'#9CA3AF',test:t=>!t.due,assign:t=>t.due=null}];
}
/* Sub-sections inside a column */
function subsections(tasks){
  const td=todayISO();
  const secs=[ {key:'pinned',label:'Pinned'}, {key:'overdue',label:'Overdue'},
    {key:'today',label:'Today'}, {key:'upcoming',label:'Upcoming'}, {key:'nodate',label:'No Date'} ];
  const buckets={pinned:[],overdue:[],today:[],upcoming:[],nodate:[]};
  for(const t of tasks){
    if(t.pinned) buckets.pinned.push(t);
    else if(t.due && t.due<td && !t.done) buckets.overdue.push(t);
    else if(t.due===td) buckets.today.push(t);
    else if(t.due) buckets.upcoming.push(t);
    else buckets.nodate.push(t);
  }
  return secs.map(s=>({...s,tasks:buckets[s.key]})).filter(s=>s.tasks.length>0);
}
const SORTS = [ ['pri-desc','Prioritas ↑'], ['pri-asc','Prioritas ↓'], ['due-asc','Tenggat terdekat'],
  ['due-desc','Tenggat terjauh'], ['az','Abjad A–Z'], ['za','Abjad Z–A'],
  ['new','Terbaru'], ['old','Terlama'] ];
const PRIV={high:3,medium:2,low:1,none:0};
function sortTasks(list,mode){
  const l=[...list];
  const dueVal=t=>t.due? t.due : '9999-99-99';
  switch(mode){
    case 'pri-desc': l.sort((a,b)=>PRIV[b.priority||'none']-PRIV[a.priority||'none']); break;
    case 'pri-asc':  l.sort((a,b)=>PRIV[a.priority||'none']-PRIV[b.priority||'none']); break;
    case 'due-asc':  l.sort((a,b)=>dueVal(a)<dueVal(b)?-1:1); break;
    case 'due-desc': l.sort((a,b)=>dueVal(a)>dueVal(b)?-1:1); break;
    case 'az': l.sort((a,b)=>a.title.localeCompare(b.title)); break;
    case 'za': l.sort((a,b)=>b.title.localeCompare(a.title)); break;
    case 'old': l.sort((a,b)=>a.createdAt-b.createdAt); break;
    default:   l.sort((a,b)=>b.createdAt-a.createdAt);
  }
  return l;
}

/* ---------- Card HTML ---------- */
function cardHTML(t){
  const f=folderOf(t.folderId);
  const prog=t.subtasks.length?`<span class="chip cprog">${ic('check',12)} ${t.subtasks.filter(s=>s.done).length}/${t.subtasks.length}</span>`:'';
  const dchip=t.due?`<span class="chip cdate ${dateClass(t.due)}">${ic('calendar',12)} ${fmtDate(t.due)}${t.time?' '+t.time:''}</span>`:'';
  const pchip=(t.priority&&t.priority!=='none')?`<span class="chip cpri ${t.priority}">${ic('flag',12)} ${PRI[t.priority].lbl}</span>`:'';
  const tags=t.tags.map(x=>`<span class="chip">#${esc(x)}</span>`).join('');
  return `<div class="card ${t.pinned?'pinned':''} ${t.done?'done-card':''}" draggable="true"
    ondragstart="dragStart(event,'${t.id}')" ondragend="this.classList.remove('dragging')"
    onclick="openModal('${t.id}')">

        ${dchip}${pchip}${tags}${prog}

    <button class="pinbtn" title="Pin" onclick="event.stopPropagation();togglePin('${t.id}')">${ic('pin',13)}</button>

/* ---------- Kanban render ---------- */
function renderBoard(el){
  const cols=columnsFor(S.ui.groupBy);
  const tasks=visibleTasks();
  el.innerHTML = `<div class="board">` + cols.map(c=>{
    const ct=tasks.filter(c.test);
    const sortMode=S.ui.sort[S.ui.groupBy+':'+c.key]||'new';
    const secs=subsections(sortTasks(ct,sortMode));
    const body = secs.length? secs.map(sec=>{
      const cKey=S.ui.groupBy+':'+c.key+':'+sec.key;
      const closed=!!S.ui.collapsed[cKey];
      return `<div>
        <div class="subsec-head ${closed?'closed':''}" onclick="toggleSec('${cKey}')">
          <span class="chev">${ic('chevDown',12)}</span> ${sec.label} <span class="scount">${sec.tasks.length}</span>
        </div>
        <div class="subsec-body ${closed?'closed':''}">${sec.tasks.map(cardHTML).join('')}</div>
      </div>`;
    }).join('') : `<div class="empty">Belum ada tugas di sini</div>`;
    return `<div class="kcol" style="--acc:${c.color}"
      ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')"

        <span class="cbadge">${ct.length}</span><span class="flex1"></span>
        ${S.ui.groupBy==='folder'?`<button class="dots" title="Edit subfolder" onclick="editFolder('${c.key}')">${ic('dots',16)}</button>`:''}</div>
      <div class="kfilter">
        <select onchange="setSort('${c.key}',this.value)" title="Sort">

function toggleSec(k){ S.ui.collapsed[k]=!S.ui.collapsed[k]; save(); render(); }
function setSort(colKey,v){ S.ui.sort[S.ui.groupBy+':'+colKey]=v; save(); render(); }

function openQuickAdd(colKey){
  const wrap=document.getElementById('qa-'+colKey);

  wrap.innerHTML=`<div class="qa-box">

      <span class="qa-hint">!high · besok · #tag</span>

      <button class="btn-ghost" onclick="render()">Batal</button>
      <button class="btn-primary" onclick="qaCommit('${colKey}')">Add</button>
    </div>
  </div>`;
  const inp=document.getElementById('qa-in-'+colKey);

function qaPreview(colKey){
  const v=document.getElementById('qa-in-'+colKey).value;
  document.getElementById('qa-ch-'+colKey).innerHTML=chipHTML(parseInput(v));
}
function qaKey(e,colKey){
  if(e.key==='Escape'){ render(); return; }
  if(e.key!=='Enter') return;
  e.preventDefault();
  qaCommit(colKey);
}
function qaCommit(colKey){
  const inp=document.getElementById('qa-in-'+colKey); if(!inp) return;
  const v=inp.value.trim(); if(!v){ inp.focus(); return; }
  const p=parseInput(v); if(!p.title){ inp.focus(); return; }
  // If grouping by folder, the column key IS the target subfolder id.
  const folderId = (S.ui.groupBy==='folder') ? colKey : defaultLeaf();
  const t={id:uid(),title:p.title,notes:'',status:'todo',priority:p.priority||'none',due:p.due,
    time:p.time,tags:p.tags,folderId:folderId,subtasks:[],done:false,pinned:false,
    quadrant:null,createdAt:Date.now()};
  const col=columnsFor(S.ui.groupBy).find(c=>c.key===colKey);
  if(col) col.assign(t); // sets status/priority/date for non-folder groupings; folder assign re-affirms folderId
  mutate(()=>S.tasks.push(t));
  openQuickAdd(colKey); // keep adding in same column
}

/* ---------- Drag & drop between columns ---------- */
let dragId=null;
function dragStart(e,id){ dragId=id; e.dataTransfer.effectAllowed='move'; e.target.classList.add('dragging'); }
function dropOnCol(e,colKey){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  if(!dragId) return;
  const col=columnsFor(S.ui.groupBy).find(c=>c.key===colKey);
  const t=S.tasks.find(x=>x.id===dragId); dragId=null;
  if(col&&t) mutate(()=>col.assign(t));
}

/* ---------- Dashboard ---------- */
function renderDash(el){
  const ts=visibleTasks(); const td=todayISO();
  const done=ts.filter(t=>t.done).length, total=ts.length;
  const pct=total?Math.round(done/total*100):0;
  const over=ts.filter(t=>t.due&&t.due<td&&!t.done).length;
  const dueToday=ts.filter(t=>t.due===td&&!t.done).length;
  // weekly bars: tasks due per day next 7 days
  let bars='';
  for(let i=0;i<7;i++){ const d=addDays(td,i);

    const h=Math.min(100, n*22+3);
    const dt=new Date(d+'T00:00:00');
    bars+=`<div class="b"><div class="bar" style="height:${h}%;${i===0?'background:var(--green)':''}"></div>
      <div class="bl">${DOW[dt.getDay()]}</div></div>`; }
  const next=sortTasks(ts.filter(t=>!t.done&&t.due),'due-asc').slice(0,6);
  el.innerHTML=`<div class="dash"><div class="dash-grid">
    <div class="widget"><div class="wt">Task Completed</div>
      <div class="donut" style="background:conic-gradient(var(--green) ${pct*3.6}deg,#EAECF0 0)">
        <div class="hole">${pct}%<span>${done}/${total}</span></div></div>
      <div class="sub" style="text-align:center">tugas selesai</div></div>
    <div class="widget"><div class="wt">Overdue</div><div class="big" style="color:var(--red)">${over}</div>
      <div class="sub">melewati tenggat</div></div>
    <div class="widget"><div class="wt">Due Today</div><div class="big" style="color:var(--blue)">${dueToday}</div>
      <div class="sub">jatuh tempo hari ini</div></div>
    <div class="widget" style="grid-column:span 2;min-width:0"><div class="wt">Beban 7 Hari ke Depan</div>
      <div class="bars">${bars}</div></div>
    <div class="widget dash-list" style="min-width:0"><div class="wt">Berikutnya</div>
      ${next.length?next.map(t=>`<div class="drow">
        <span style="width:8px;height:8px;border-radius:50%;background:${folderOf(t.folderId).color};flex:0 0 8px"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</span>
        <span class="chip cdate ${dateClass(t.due)}">${fmtDate(t.due)}</span></div>`).join('')

}

/* ---------- Calendar ---------- */
function calYM(){ if(!S.ui.calYM){ const d=new Date(); S.ui.calYM=[d.getFullYear(),d.getMonth()]; } return S.ui.calYM; }
function calNav(n){ let [y,m]=calYM(); m+=n; if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  S.ui.calYM=[y,m]; save(); render(); }
function renderCalendar(el,compact){
  const [y,m]=calYM(); const td=todayISO();
  const first=new Date(y,m,1); const startDow=first.getDay();
  const start=addDays(y+'-'+String(m+1).padStart(2,'0')+'-01',-startDow);
  const ts=visibleTasks();
  let cells='';
  for(const d of DOW) cells+=`<div class="cal-dow">${d}</div>`;
  for(let i=0;i<42;i++){
    const iso=addDays(start,i);
    const dm=+iso.slice(5,7)-1;
    const dayTasks=ts.filter(t=>t.due===iso);
    const shown=dayTasks.slice(0,compact?2:3);
    cells+=`<div class="cal-cell ${dm!==m?'dim':''} ${iso===td?'today':''}" onclick="calDay('${iso}')">
      <div class="dnum">${+iso.slice(8,10)}</div>
      ${shown.map(t=>`<div class="cal-task" style="--tc:${folderOf(t.folderId).color};
        ${t.done?'text-decoration:line-through;opacity:.55':''}">${esc(t.title)}</div>`).join('')}
      ${dayTasks.length>shown.length?`<div class="cal-more">+${dayTasks.length-shown.length} lagi</div>`:''}
    </div>`;
  }
  el.innerHTML=`<div class="calwrap">
    <div class="cal-head"><button class="cal-nav" onclick="calNav(-1)">${ic('chevLeft',16)}</button>
      <b>${['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'][m]} ${y}</b>
      <button class="cal-nav" onclick="calNav(1)">${ic('chevRight',16)}</button>
      <button class="btn-ghost" onclick="S.ui.calYM=null;save();render()">Hari ini</button></div>
    <div class="cal-grid" style="grid-template-rows:auto repeat(6,minmax(${compact?'64':'84'}px,1fr))">${cells}</div>
  </div>`;
  // Swipe left/right to change month (mobile). Left = next, Right = prev.
  const cw=el.querySelector('.calwrap');
  if(cw){
    let sx=null, sy=null;
    cw.addEventListener('touchstart',ev=>{ const t=ev.touches[0]; sx=t.clientX; sy=t.clientY; },{passive:true});
    cw.addEventListener('touchend',ev=>{
      if(sx===null) return;
      const t=ev.changedTouches[0];
      const dx=t.clientX-sx, dy=t.clientY-sy;
      if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)*1.5){ calNav(dx<0?1:-1); }
      sx=sy=null;
    },{passive:true});
  }
}
function calDay(iso){
  const list=visibleTasks().filter(t=>t.due===iso);
  if(!list.length){ // quick create on empty day
    const title=prompt('Tugas baru untuk '+fmtDate(iso)+':'); if(!title) return;
    const p=parseInput(title);
    mutate(()=>S.tasks.push({id:uid(),title:p.title||title,notes:'',status:'todo',
      priority:p.priority||'none',due:iso,time:p.time,tags:p.tags,folderId:defaultLeaf(),subtasks:[],
      done:false,pinned:false,quadrant:null,createdAt:Date.now()}));
    return;
  }
  if(list.length===1){ openModal(list[0].id); return; }
  const pick=prompt('Tugas '+fmtDate(iso)+':\n'+list.map((t,i)=>(i+1)+'. '+t.title).join('\n')+'\n\nNomor untuk buka:');
  const idx=parseInt(pick,10)-1;
  if(list[idx]) openModal(list[idx].id);
}

/* ---------- Timeline ---------- */
function renderTimeline(el){
  const td=todayISO(); const days=[]; for(let i=-2;i<12;i++) days.push(addDays(td,i));
  const ts=visibleTasks().filter(t=>t.due);
  let html=`<div class="tlwrap"><div class="tl-scale"><div></div>${days.map(d=>{
    const dt=new Date(d+'T00:00:00');
    return `<div class="tld ${d===td?'today':''}">${DOW[dt.getDay()]}<br>${dt.getDate()}</div>`;}).join('')}</div>`;
  for(const f of leafFolders()){
    const ft=ts.filter(t=>t.folderId===f.id);
    if(!ft.length) continue;
    html+=`<div class="tl-row" data-fid="${f.id}"
      ondragover="event.preventDefault()" ondrop="tlDrop(event,'${f.id}')">
      <div class="tl-fold"><span style="color:${f.color};display:inline-flex">${ic(f.icon,15)}</span> ${esc(f.name)}</div>
      ${days.map(d=>`<div class="tl-cell ${d===td?'today':''}"></div>`).join('')}
      ${ft.map(t=>{
        const idx=days.indexOf(t.due);
        if(idx<0) return '';
        const left=`calc(150px + (100% - 150px) * ${idx} / 14)`;
        const w=`calc((100% - 150px)/14 - 6px)`;
        return `<div class="tl-bar" draggable="true" ondragstart="dragStart(event,'${t.id}')"
          onclick="openModal('${t.id}')"
          style="left:${left};width:${w};background:${f.color};${t.done?'opacity:.5':''}">${esc(t.title)}</div>`;
      }).join('')}
    </div>`;
  }
  html+=`<div class="empty" style="margin-top:10px">Seret bar ke kolom hari lain untuk mengubah tenggat</div></div>`;
  el.innerHTML=html;
}
function tlDrop(e,fid){
  if(!dragId) return;
  const row=e.currentTarget; const rect=row.getBoundingClientRect();
  const x=e.clientX-rect.left-150; const w=(rect.width-150)/14;
  let idx=Math.floor(x/w); idx=Math.max(0,Math.min(13,idx));
  const iso=addDays(todayISO(),idx-2);
  const t=S.tasks.find(x2=>x2.id===dragId); dragId=null;
  if(t) mutate(()=>{ t.due=iso; t.folderId=fid; });
}

/* ---------- Eisenhower Matrix ---------- */
function quadrantOf(t){
  if(t.quadrant) return t.quadrant;
  const td=todayISO();
  const urgent=t.due && t.due<=addDays(td,2);
  const important=t.priority==='high'||t.priority==='medium';
  return urgent?(important?'q1':'q3'):(important?'q2':'q4');
}

  ['q3','⚡ Urgent, Tak Penting','Delegasikan / cepat'], ['q4','🌫️ Tak Keduanya','Kurangi'] ];
function renderEisenhower(el){
  const ts=visibleTasks().filter(t=>!t.done);
  el.innerHTML=`<div class="eiwrap">${QUADS.map(([q,name,hint])=>{
    const qt=ts.filter(t=>quadrantOf(t)===q);
    return `<div class="quad ${q}" ondragover="event.preventDefault();this.classList.add('dragover')"
      ondragleave="this.classList.remove('dragover')" ondrop="eiDrop(event,'${q}')">
      <h4>${name} <span class="qc">${qt.length}</span>

function eiDrop(e,q){
  e.currentTarget.classList.remove('dragover');

   sinkron ke Firebase memakai UID tetap 'solo', jadi web & Android berbagi
   data yang sama tanpa perlu login. */
const SOLO_UID='solo';
function bootAuth(){
  if(!S.ui.groupBy) S.ui.groupBy='status';
  hideGate();
  window.__USER=null;
  window.__onDbError=(msg)=>{
    // Rules menolak akses (misal belum di-publish) — app tetap jalan dari cache lokal.
    setSync('error');
    console.warn('DB access denied:', msg);
  };
  // Selalu pakai SOLO_UID agar path cocok dengan rules (users/solo/board).
  // Kalau gagal, coba ulang sekali dengan UID yang sama (bukan path lain).
  startSync(SOLO_UID).catch(e=>{ console.warn('startSync error',e); setTimeout(()=>startSync(SOLO_UID).catch(()=>{}), 500); });
}

}

/* Set / hapus lencana pada ikon aplikasi (Desktop PWA & Android).
   PENTING: clearAppBadge() dipanggil saat 0 supaya "logo notifikasi"
   benar-benar hilang setelah tugas dibuka/diselesaikan. */
async function refreshAppBadge(){
  try{
    // Lencana angka pada ikon aplikasi dinonaktifkan: SELALU bersihkan,
    // jangan pernah memasang angka.
    if('clearAppBadge' in navigator){
      await navigator.clearAppBadge();
    }
    // Beri tahu service worker juga (untuk kasus PWA di background)
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:'badge', count:0});
    }
  }catch(e){ /* diamkan: sebagian browser belum dukung Badging API */ }
}

/* --------- Notifikasi deadline (khusus perangkat yang mendukung) --------- */
const NOTIFIED_KEY='a31-notified-v1';

function getNotified(){
  try{ return JSON.parse(localStorage.getItem(NOTIFIED_KEY)||'{}'); }catch(e){ return {}; }
}
function setNotified(map){ try{ localStorage.setItem(NOTIFIED_KEY, JSON.stringify(map)); }catch(e){} }

/* Minta izin notifikasi sekali (dipicu oleh interaksi pertama pengguna) */
async function ensureNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied')  return false;
  try{ const p=await Notification.requestPermission(); return p==='granted'; }
  catch(e){ return false; }
}
// Picu permintaan izin pada sentuhan/klik pertama (syarat browser mobile)
['click','touchend'].forEach(ev=>{
  window.addEventListener(ev, ()=>{ ensureNotifPermission(); }, {once:true, passive:true});
});

/* Tampilkan notifikasi (lewat SW kalau ada, agar muncul di Android
   meski tab tidak fokus). */
async function fireNotification(title, body, tag){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const opts={ body, tag, renotify:false, icon:APP_LOGO, badge:APP_LOGO,
               data:{url: location.pathname} };
  try{
    if(navigator.serviceWorker){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg){ reg.showNotification(title, opts); return; }
    }
  }catch(e){}
  try{ new Notification(title, opts); }catch(e){}
}

/* Cek tugas: kirim notifikasi untuk yang jatuh tempo hari ini / terlewat,
   maksimal sekali per tugas per hari. */
function checkDeadlines(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const td=todayISO();
  const notified=getNotified();
  // buang catatan hari lampau supaya map tidak membengkak
  for(const k of Object.keys(notified)){ if(notified[k]!==td) delete notified[k]; }

  const now=new Date();
  const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');

  for(const t of S.tasks){
    if(t.done || !t.due) continue;
    const key=t.id;
    if(notified[key]===td) continue;            // sudah dinotif hari ini

    let fire=false, title='', body='';
    if(t.due<td){
      fire=true; title='⏰ Tugas terlewat';
      body=`"${t.title}" sudah lewat tenggat (${fmtDate(t.due)}).`;
    } else if(t.due===td){
      // kalau ada jam: notif saat jam tersebut tiba; kalau tidak, notif sejak awal hari
      if(!t.time || t.time<=hhmm){
        fire=true; title='📌 Deadline hari ini';
        body=`"${t.title}" jatuh tempo hari ini${t.time?(' jam '+t.time):''}.`;
      }
    }
    if(fire){ fireNotification(title, body, 'a31-'+key); notified[key]=td; }
  }
  setNotified(notified);
  refreshAppBadge();
}

/* Jalankan pengecekan sekarang + berkala tiap menit. */
function scheduleDeadlineChecks(){
  if(__notifTimer) return;                 // sudah terjadwal
  checkDeadlines();
  __notifTimer=setInterval(checkDeadlines, 60*1000);
}
// Cek ulang saat app kembali ke depan (buka dari background di Android)
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) checkDeadlines(); });

/* ---------- PWA: register service worker + install prompt ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault(); deferredPrompt=e;
  const b=document.getElementById('install-btn'); if(b) b.classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async ()=>{
  const b=document.getElementById('install-btn');
  if(deferredPrompt){ deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; b.classList.remove('show'); }
});
window.addEventListener('appinstalled', ()=>{ const b=document.getElementById('install-btn'); if(b) b.classList.remove('show'); });

// Handle app-shortcut deep links (?smart=today, ?add=1)
(function(){ const q=new URLSearchParams(location.search);
  if(q.get('smart')) S.ui.smart=q.get('smart');
})();
</script>
